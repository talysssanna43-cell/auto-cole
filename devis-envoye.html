<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande envoyée - Auto-Ecole Breteuil</title>
    <meta name="description" content="Confirmation d'envoi de demande de devis.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-page {
            padding: 5rem 0;
            background: linear-gradient(180deg, rgba(16,185,129,0.08), rgba(233,30,99,0.02));
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-card {
            max-width: 780px;
            margin: 0 auto;
            background: #fff;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            text-align: center;
        }
        .success-icon {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16,185,129,0.12);
            color: #0a8e47;
            font-size: 2.25rem;
        }
        .success-card h1 {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }
        .success-card p {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .success-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .success-actions a {
            min-width: 240px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">
                    <img src="assets/logo.png" alt="Auto-Ecole Breteuil">
                    <span>Auto-Ecole <strong>Breteuil</strong></span>
                </a>
                <div class="nav-actions">
                    <a href="connexion.html" class="btn-secondary">Se connecter</a>
                    <a href="inscription.html" class="btn-primary">S'inscrire</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="success-page">
        <div class="container">
            <div class="success-card">
                <div class="success-icon"><i class="fas fa-check"></i></div>
                <h1>Votre demande a bien été envoyée</h1>
                <p>Merci ! Nous avons bien reçu ta demande de devis. Tu recevras ton devis par email <strong>sous 48h</strong>.</p>
                <div class="success-actions">
                    <a href="index.html" class="btn-primary"><i class="fas fa-house"></i> Retour à l'accueil</a>
                    <a href="tarifs.html" class="btn-secondary"><i class="fas fa-tags"></i> Voir les tarifs</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
