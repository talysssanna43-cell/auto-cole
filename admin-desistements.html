<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Désistements - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/admin-mobile.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff1493;
            --text: #1d1d1f;
            --text2: #86868b;
            --bg: #fbfbfd;
            --border: #d2d2d7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text);
            margin: 5px 0;
            transition: 0.3s;
        }

        .topbar-tabs {
            display: flex;
            gap: 8px;
        }

        .topbar-tabs a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text2);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }

        .topbar-tabs a:hover {
            background: #f5f5f7;
            color: var(--text);
        }

        .topbar-tabs a.active {
            background: var(--primary-color);
            color: white;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-inscription {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 980px;
            border: none;
            background: #34c759;
            color: white;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-inscription:hover {
            background: #2fb04f;
            transform: translateY(-1px);
        }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 980px;
            border: none;
            background: none;
            color: var(--text2);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #f5f5f7;
            color: var(--text);
        }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header-row h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .week-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .week-selector button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text);
            transition: all 0.2s;
        }

        .week-selector button:hover:not(:disabled) {
            background: #f5f5f7;
        }

        .week-selector button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .week-selector span {
            font-weight: 600;
            min-width: 200px;
            text-align: center;
        }

        .planning-grid {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .planning-table {
            width: 100%;
            border-collapse: collapse;
        }

        .planning-table th {
            background: #f5f5f7;
            padding: 16px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border);
        }

        .planning-table td {
            padding: 8px;
            border: 1px solid #e5e5e7;
            vertical-align: top;
            min-height: 80px;
        }

        .planning-table td.time-cell {
            background: #fafafa;
            font-weight: 600;
            text-align: center;
            width: 100px;
            color: var(--text2);
        }

        .student-tag {
            display: inline-block;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .student-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .empty-cell {
            color: var(--text2);
            font-style: italic;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        .legend {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .legend h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text);
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 20px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .topbar-tabs {
                display: none;
            }

            .menu-toggle {
                display: block;
            }

            .planning-table {
                font-size: 0.8rem;
            }

            .student-tag {
                font-size: 0.75rem;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <div class="topbar-content">
            <div class="topbar-left">
                <a href="index.html" class="logo">Auto-École</a>
                <button class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="topbar-tabs" id="adminTabs">
                <a href="admin-planning.html">Planning</a>
                <a href="admin-desistements.html" class="active">Désistements</a>
                <a href="admin-candidatures.html">Candidatures <span class="notif-badge" id="candidaturesBadge" style="display: none;">0</span></a>
                <a href="admin-analytics.html">Analytics</a>
                <a href="admin-support.html">Support <span class="notif-badge" id="supportBadge" style="display: none;">0</span></a>
                <a href="admin-contact.html">Contact <span class="notif-badge" id="contactBadge" style="display: none;">0</span></a>
                <a href="admin-code-rousseau.html">Code Rousseau <span class="notif-badge" id="codeRousseuBadge" style="display: none;">0</span></a>
            </div>
            <div class="topbar-right">
                <a href="inscription.html?admin=true" class="btn-inscription">
                    <i class="fas fa-user-plus"></i> Nouvelle inscription
                </a>
                <a href="index.html" style="color: #86868b; text-decoration: none; font-size: 14px;"><i class="fas fa-arrow-left"></i> Retour au site</a>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Quitter</button>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="header-row">
            <h1><i class="fas fa-calendar-alt"></i> Planning Désistements</h1>
            <div class="week-selector">
                <button id="prevWeekBtn" onclick="changeWeek(-1)">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="weekDisplay">Semaine du ...</span>
                <button id="nextWeekBtn" onclick="changeWeek(1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div class="legend">
            <h3><i class="fas fa-info-circle"></i> Légende</h3>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);"></div>
                <span>Élève disponible pour ce créneau</span>
            </div>
        </div>

        <div class="planning-grid">
            <table class="planning-table" id="planningTable">
                <thead>
                    <tr>
                        <th>Horaire</th>
                        <th>Lundi</th>
                        <th>Mardi</th>
                        <th>Mercredi</th>
                        <th>Jeudi</th>
                        <th>Vendredi</th>
                        <th>Samedi</th>
                    </tr>
                </thead>
                <tbody id="planningBody">
                    <!-- Généré dynamiquement -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/admin-desistements.js"></script>
</body>
</html>
