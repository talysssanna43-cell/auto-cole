<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Ecole Breteuil - Réinitialisation du mot de passe</title>
    <meta name="description" content="Réinitialise ton mot de passe pour accéder à ton espace élève Auto-Ecole Breteuil.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(233,30,99,0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .reset-card {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(233,30,99,0.2);
            position: relative;
            overflow: hidden;
        }
        .reset-card::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: var(--primary-gradient);
            opacity: 0.08;
            top: -80px;
            right: -80px;
        }
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }
        .reset-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }
        .reset-header p {
            color: var(--text-light);
        }
        .reset-form {
            position: relative;
            z-index: 1;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 1rem;
            transition: border var(--transition-base), box-shadow var(--transition-base);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255,105,180,0.15);
        }
        .reset-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }
        .reset-footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
        }
        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 1rem;
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            display: none;
        }
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 1rem;
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            display: none;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #0071e3;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <a href="connexion.html" style="display:inline-flex;align-items:center;gap:6px;color:#666;text-decoration:none;font-size:0.9rem;margin-bottom:1rem;">
            <i class="fas fa-arrow-left"></i> Retour à la connexion
        </a>
        <div class="reset-header">
            <h1>Mot de passe oublié ?</h1>
            <p>Entre ton adresse e-mail pour recevoir un nouveau mot de passe.</p>
        </div>
        
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        
        <form class="reset-form" id="resetForm">
            <div class="info-box">
                <i class="fas fa-info-circle"></i> Un nouveau mot de passe sera généré automatiquement et envoyé à ton adresse e-mail.
            </div>
            
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" placeholder="ton-email@exemple.com" required>
            </div>
            
            <button type="submit" class="btn-primary btn-block" style="font-size: 1.05rem;">
                <i class="fas fa-paper-plane"></i> Réinitialiser mon mot de passe
            </button>
            
            <div class="reset-footer">
                Tu te souviens de ton mot de passe ? <a href="connexion.html">Se connecter</a>
            </div>
        </form>
    </div>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="assets/js/supabaseClient.js"></script>
    <script src="assets/js/reset-password.js"></script>
</body>
</html>
