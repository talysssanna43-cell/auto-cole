<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Ecole Breteuil - Connexion</title>
    <meta name="description" content="Connecte-toi à ton espace élève Auto-Ecole Breteuil pour réserver tes heures de conduite et suivre ta progression.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(233,30,99,0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(233,30,99,0.2);
            position: relative;
            overflow: hidden;
        }
        .login-card::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: var(--primary-gradient);
            opacity: 0.08;
            top: -80px;
            right: -80px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }
        .login-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--text-light);
        }
        .login-form {
            position: relative;
            z-index: 1;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 1rem;
            transition: border var(--transition-base), box-shadow var(--transition-base);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255,105,180,0.15);
        }
        .login-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .login-actions a {
            color: var(--primary-dark);
            font-size: 0.95rem;
            text-decoration: none;
        }
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.9rem;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .social-buttons {
            display: flex;
            gap: 1rem;
        }
        .social-buttons button {
            flex: 1;
            border: none;
            border-radius: var(--radius-lg);
            padding: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-google {
            background: #fff3f7;
            color: #DB4437;
        }
        .btn-facebook {
            background: #EEF2FF;
            color: #1877F2;
        }
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }
        .login-footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>Connexion</h1>
            <p>Accède à ton espace pour réserver tes heures et suivre ta progression.</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" placeholder="talysssanna43@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="login-actions">
                <label style="display: flex; gap: 0.35rem; align-items: center; font-size: 0.95rem;">
                    <input type="checkbox" style="accent-color: #FF69B4;"> Rester connecté(e)
                </label>
                <a href="#">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="btn-primary btn-block" style="font-size: 1.05rem;">Se connecter</button>
            <div class="divider">ou</div>
            <div class="social-buttons">
                <button type="button" class="btn-google"><i class="fab fa-google"></i> Google</button>
                <button type="button" class="btn-facebook"><i class="fab fa-facebook"></i> Facebook</button>
            </div>
            <div class="login-footer">
                Pas encore de compte ? <a href="inscription.html">Créer un espace élève</a>
            </div>
        </form>
    </div>
    <script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="assets/js/supabaseClient.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!window.supabaseClient) {
                alert('Supabase n’est pas initialisé. Merci de réessayer dans un instant.');
                return;
            }

            try {
                const hashedPassword = await window.hashPassword(password);

                const { data, error } = await window.supabaseClient
                    .from('users')
                    .select('id, prenom, email, password_hash')
                    .ilike('email', email)
                    .limit(1)
                    .maybeSingle();

                if (error || !data) {
                    alert('Compte introuvable. Vérifie ton email ou inscris-toi.');
                    return;
                }

                if (data.password_hash !== hashedPassword) {
                    alert('Mot de passe incorrect.');
                    return;
                }

                localStorage.setItem('ae_user', JSON.stringify({
                    id: data.id,
                    prenom: data.prenom,
                    email
                }));

                alert(`Bienvenue ${data.prenom || ''} ! Connexion réussie.`);
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 50);
            } catch (error) {
                console.error('Erreur connexion Supabase:', error);
                alert('Serveur indisponible. Réessaie dans un instant.');
            }
        });
    </script>
</body>
</html>
